name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages and verify deployment origin.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docusaurus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so Docusaurus' showLastUpdateTime reads each page's real last-commit
          # date. A shallow clone (the default) would stamp every page with the same date.
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Also gated here, not just in ci.yml: that workflow runs only on
      # pull_request, so a direct push to main would publish an unchecked quiz to
      # the live site — which is exactly the surface the H1387 defect sat on.
      # Deliberately NOT continue-on-error; it is deterministic, so a red here
      # means the data really is gameable and should not ship.
      - name: Verify quiz answer positions
        run: npm run verify:quiz-positions
      - name: Refresh dictionary catalog from live site (non-fatal)
        run: npm run build:catalog
        continue-on-error: true
      - name: Build site
        run: npm run build
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
