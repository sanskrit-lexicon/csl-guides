name: CI

# Build the site on every pull request so broken links and build errors are caught
# before merge (the production build runs Docusaurus' onBrokenLinks: 'throw' check).
# Deployment is handled separately by deploy.yml on push to main.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Docusaurus (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Cheap, deterministic, and independent of the build — so it runs first and
      # fails in seconds rather than after a ~40s compile. Guards the H1387 defect:
      # every quiz bank was once authored with its answer first, so "always pick A"
      # scored 100% on six public quizzes.
      - name: Verify quiz answer positions
        run: npm run verify:quiz-positions
      - name: Build site
        run: npm run build
