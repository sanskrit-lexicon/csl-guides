name: CI

# Build the site on every pull request so broken links and build errors are caught
# before merge (the production build runs Docusaurus' onBrokenLinks: 'throw' check).
# Deployment is handled separately by deploy.yml on push to main.

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Docusaurus (no deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build site
        run: npm run build
